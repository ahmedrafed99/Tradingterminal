<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d29"/>
      <stop offset="100%" stop-color="#0d0f17"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#26c6da"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#2a2e39" stroke-width="0.5"/>

  <!-- Area fill under the line -->
  <path d="M4,20 L8,18 L12,21 L16,14 L20,16 L24,10 L28,7 L28,27 L4,27 Z" fill="url(#fill)"/>

  <!-- Chart line -->
  <polyline points="4,20 8,18 12,21 16,14 20,16 24,10 28,7" fill="none" stroke="url(#line)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- End dot -->
  <circle cx="28" cy="7" r="2" fill="#26c6da" opacity="0.9"/>

  <!-- Base line -->
  <line x1="4" y1="27" x2="28" y2="27" stroke="#2a2e39" stroke-width="1"/>
</svg>
